apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: kargo
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: demo-app
    sources:
      direct: true
  promotionTemplate:
    spec:
      steps:
      - uses: git-clone
        config:
          repoURL: https://github.com/kargobook/demo-gitops.git
          checkout:
          - branch: main
            path: ./repo
      - uses: kustomize-set-image
        config:
          path: ./repo/envs/dev
          images:
          - image: ghcr.io/kargobook/demo-app
      - uses: git-commit
        as: commit
        config:
          path: ./repo
          message: "Promote to dev: ${{ freight.images[0].tag }}"
      - uses: git-push
        config:
          path: ./repo
          targetBranch: main
      - uses: argocd-update
        config:
          apps:
          - name: demo-dev
            sources:
            - repoURL: https://github.com/kargobook/demo-gitops.git
